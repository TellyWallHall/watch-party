<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Watch Party</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --bg: #000000;
      --accent: #ffffff;
      --gray: #888888;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      color: var(--accent);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      -webkit-user-select: none;
      user-select: none;
    }

    /* Setup Screen */
    #setup-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 30px;
      padding: 20px;
      text-align: center;
    }

    #setup-screen h1 {
      font-size: 24px;
      font-weight: 300;
      letter-spacing: 2px;
    }

    .btn {
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 15px 30px;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .btn:active {
      background: var(--accent);
      color: var(--bg);
    }

    .btn.active {
      background: var(--accent);
      color: var(--bg);
    }

    #file-input {
      display: none;
    }

    /* Video Container */
    #video-container {
      display: none;
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: #000;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
    }

    /* Reactions */
    #reactions-container {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 10;
    }

    .reaction-bar {
      position: absolute;
      top: 20px;
      right: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 20;
      pointer-events: none;
    }

    .reaction-btn {
      background: rgba(255, 255, 255, 0.15);
      border: none;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      font-size: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: auto;
    }

    .floating-emoji {
      position: absolute;
      bottom: -50px;
      font-size: 35px;
      animation: floatUp 2.5s ease-out forwards;
      pointer-events: none;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(0) scale(1);
        opacity: 1;
      }

      100% {
        transform: translateY(-60vh) scale(1.5);
        opacity: 0;
      }
    }

    #status-text {
      color: var(--gray);
      font-size: 14px;
      max-width: 250px;
    }

  </style>
</head>

<body>

  <!-- Setup Screen -->
  <div id="setup-screen">
    <h1>WATCH PARTY</h1>
    <button class="btn" id="load-btn"><i class="fas fa-film"></i> Load Video</button>
    <input type="file" id="file-input" accept="video/*">
    <button class="btn" id="ready-btn" style="display: none;"><i class="fas fa-check"></i> I'm Ready</button>
    <p id="status-text">Waiting for video...</p>
  </div>

  <!-- Video Screen -->
  <div id="video-container">
    <video id="video-player" playsinline controls></video>

    <div id="reactions-container"></div>

    <div class="reaction-bar">
      <button class="reaction-btn" data-emoji="😂">😂</button>
      <button class="reaction-btn" data-emoji="😱">😱</button>
      <button class="reaction-btn" data-emoji="❤️">❤️</button>
      <button class="reaction-btn" data-emoji="🔥">🔥</button>
    </div>
  </div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

  <script>
    // --- 1. FIREBASE CONFIG ---
    const firebaseConfig = {
      apiKey: "AIzaSyA-aYLP7eTUr3vyGqIuFJ1GVE42JjcM1UU",
      authDomain: "fbchesst.firebaseapp.com",
      databaseURL: "https://fbchesst-default-rtdb.firebaseio.com",
      projectId: "fbchesst",
      storageBucket: "fbchesst.firebasestorage.app",
      messagingSenderId: "774699466227",
      appId: "1:774699466227:web:e140d20877c19ec1e9e686",
      measurementId: "G-1LDBXBT2QD"
    }
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- 2. STATE VARIABLES ---
    const myId = Math.random().toString(36).substr(2, 9);
    let isRemoteAction = false;
    let myRole = null;
    let isPlayerReady = false;
    let isUnlocking = false; // Prevents the iOS unlock from sending Play/Pause signals

    // --- 3. DOM ELEMENTS ---
    const setupScreen = document.getElementById('setup-screen');
    const videoContainer = document.getElementById('video-container');
    const video = document.getElementById('video-player');
    const fileInput = document.getElementById('file-input');
    const loadBtn = document.getElementById('load-btn');
    const readyBtn = document.getElementById('ready-btn');
    const statusText = document.getElementById('status-text');
    const reactionsContainer = document.getElementById('reactions-container');

    // --- 4. SETUP & ROLE ASSIGNMENT ---
    db.ref('.info/connected').on('value', snap => {
      if (snap.val() === true) {
        db.ref('host').once('value', hostSnap => {
          if (!hostSnap.exists()) {
            myRole = 'host';
            db.ref('host').onDisconnect().remove();
            db.ref('host').set({
              id: myId,
              ready: false
            });
          } else {
            myRole = 'guest';
            db.ref('guest').onDisconnect().remove();
            db.ref('guest').set({
              id: myId,
              ready: false
            });
          }
        });
      }
    });

    loadBtn.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        video.src = URL.createObjectURL(file);
        readyBtn.style.display = 'flex';
        loadBtn.innerHTML = '<i class="fas fa-check-circle"></i> Video Loaded';
        loadBtn.style.borderColor = '#4caf50';
        loadBtn.style.color = '#4caf50';
        statusText.innerText = "Tap Ready when you're set.";
      }
    });

    readyBtn.addEventListener('click', () => {
      // iOS WORKAROUND: Must call play() inside a click handler to unlock the player
      isUnlocking = true;
      video.play().then(() => {
        video.pause(); // Immediately pause
        isUnlocking = false;
        isPlayerReady = true;
        readyBtn.classList.add('active');
        readyBtn.innerHTML = '<i class="fas fa-check"></i> Ready!';
        statusText.innerText = "Waiting for the other person...";
        db.ref(myRole + '/ready').set(true);
      }).catch(e => {
        statusText.innerText = "Error unlocking video. Try tapping Ready again.";
        isUnlocking = false;
      });
    });

    db.ref('host/ready').on('value', snap => {
      checkBothReady(snap.val(), 'host');
    });
    db.ref('guest/ready').on('value', snap => {
      checkBothReady(snap.val(), 'guest');
    });

    let hostReady = false,
      guestReady = false;

    function checkBothReady(val, role) {
      if (role === 'host') hostReady = val;
      if (role === 'guest') guestReady = val;
      if (hostReady && guestReady) startWatchParty();
    }

    // --- 5. START WATCH PARTY ---
    function startWatchParty() {
      if (videoContainer.style.display === 'block') return;
      setupScreen.style.display = 'none';
      videoContainer.style.display = 'block';

      // Clear old sync data, start fresh. No initial time push.
      db.ref('sync').set({
        isPlaying: false,
        lastActionBy: myId
      });

      listenForSync();
    }

    // --- 6. SYNC LOGIC ---

    // A. Listen to Firebase
    function listenForSync() {
      db.ref('sync').on('value', snap => {
        const data = snap.val();
        if (!data || data.lastActionBy === myId) return;
        if (!isPlayerReady) return;

        // 1. Handle Play/Pause ONLY
        if (data.isPlaying !== undefined && video.paused !== data.isPlaying) {
          isRemoteAction = true;
          if (data.isPlaying) {
            video.play().then(() => {
              isRemoteAction = false; // Successfully played, reset flag
            }).catch(e => {
              isRemoteAction = false; // Failed to play (backgrounded), reset flag
              console.log("Autoplay prevented");
            });
          } else {
            video.pause();
            isRemoteAction = false; // Pause is synchronous, reset flag
          }
        }

        // 2. Handle Seek ONLY (If data.currentTime exists, it means someone scrubbed)
        if (data.currentTime !== undefined) {
          // Only seek if the difference is significant enough to be a real scrub
          // (and not just minor float drift between devices)
          if (Math.abs(video.currentTime - data.currentTime) > 1.5) {
            isRemoteAction = true;
            video.currentTime = data.currentTime;
          }
        }
      });
    }

    // B. Local Player Event Listeners
    video.addEventListener('play', () => {
      if (isRemoteAction || isUnlocking) {
        isRemoteAction = false;
        return;
      }
      // Only tell Firebase to play. DO NOT send currentTime.
      db.ref('sync').update({
        isPlaying: true,
        lastActionBy: myId
      });
    });

    video.addEventListener('pause', () => {
      if (isRemoteAction || isUnlocking) {
        isRemoteAction = false;
        return;
      }
      // Only tell Firebase to pause. DO NOT send currentTime.
      db.ref('sync').update({
        isPlaying: false,
        lastActionBy: myId
      });
    });

    video.addEventListener('seeked', () => {
      if (isRemoteAction) {
        isRemoteAction = false;
        return;
      }
      // ONLY time we send currentTime is when someone drags the scrubber
      db.ref('sync').update({
        currentTime: video.currentTime,
        lastActionBy: myId
      });
    });

    // --- 6.5 WAKE UP LOGIC ---
    // Listen for when the user switches back to this tab/app        
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden && isPlayerReady) {
        // The tab just became visible again                
        // Let's check if we fell out of sync with Firebase                
        db.ref('sync').once('value', snap => {
          const data = snap.val();
          if (data && data.isPlaying && video.paused) {
            // Firebase says play, but our video is paused.                         
            // This means we were frozen in the background!                        
            isRemoteAction = true;
            video.play().catch(e => console.log("Autoplay blocked on resume"));
          }
        });
      }
    });

    // --- 7. REACTIONS ---
    document.querySelectorAll('.reaction-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const emoji = btn.getAttribute('data-emoji');
        db.ref('reactions').push(emoji);
        spawnEmoji(emoji);
      });
    });

    db.ref('reactions').on('child_added', snap => {
      const emoji = snap.val();
      if (emoji) {
        spawnEmoji(emoji);
        snap.ref.remove();
      }
    });

    function spawnEmoji(emoji) {
      const el = document.createElement('div');
      el.classList.add('floating-emoji');
      el.innerText = emoji;
      el.style.left = Math.random() * 70 + 15 + '%';
      reactionsContainer.appendChild(el);
      setTimeout(() => el.remove(), 2500);
    }

  </script>
</body>

</html>
