<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Watch Party</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --bg: #000000;
      --accent: #ffffff;
      --gray: #888888;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      color: var(--accent);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden;
      /* Prevents scrolling/bouncing */
      height: 100vh;
      width: 100vw;
      -webkit-user-select: none;
      user-select: none;
    }

    /* Setup Screen */
    #setup-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 30px;
      padding: 20px;
      text-align: center;
    }

    #setup-screen h1 {
      font-size: 24px;
      font-weight: 300;
      letter-spacing: 2px;
    }

    .btn {
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 15px 30px;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .btn:active {
      background: var(--accent);
      color: var(--bg);
    }

    .btn.active {
      background: var(--accent);
      color: var(--bg);
    }

    #file-input {
      display: none;
    }

    /* Video Container - Fills screen completely */
    #video-container {
      display: none;
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: #000;
    }

    /* Native Video Player styling */
    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      /* Keeps video proportional, adds black bars if needed */
      background: #000;
    }

    /* Reactions */
    #reactions-container {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      pointer-events: none;
      /* Lets clicks pass through to video */
      overflow: hidden;
      z-index: 10;
    }

    .reaction-bar {
      position: absolute;
      top: 20px;
      right: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 20;
      /* pointer-events none on container, auto on buttons so they are clickable */
      pointer-events: none;
    }

    .reaction-btn {
      background: rgba(255, 255, 255, 0.15);
      border: none;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      font-size: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: auto;
    }

    .floating-emoji {
      position: absolute;
      bottom: -50px;
      font-size: 35px;
      animation: floatUp 2.5s ease-out forwards;
      pointer-events: none;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(0) scale(1);
        opacity: 1;
      }

      100% {
        transform: translateY(-60vh) scale(1.5);
        opacity: 0;
      }
    }

    #status-text {
      color: var(--gray);
      font-size: 14px;
      max-width: 250px;
    }

  </style>
</head>

<body>

  <!-- Setup Screen -->
  <div id="setup-screen">
    <h1>WATCH PARTY</h1>
    <button class="btn" id="load-btn"><i class="fas fa-film"></i> Load Video</button>
    <input type="file" id="file-input" accept="video/*">
    <button class="btn" id="ready-btn" style="display: none;"><i class="fas fa-check"></i> I'm Ready</button>
    <p id="status-text">Waiting for video...</p>
  </div>

  <!-- Video Screen -->
  <div id="video-container">
    <!-- Native HTML5 Player with built-in controls -->
    <video id="video-player" playsinline controls></video>

    <div id="reactions-container"></div>

    <div class="reaction-bar">
      <button class="reaction-btn" data-emoji="😂">😂</button>
      <button class="reaction-btn" data-emoji="😱">😱</button>
      <button class="reaction-btn" data-emoji="❤️">❤️</button>
      <button class="reaction-btn" data-emoji="🔥">🔥</button>
    </div>
  </div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

  <script>
    // --- 1. FIREBASE CONFIG ---
    const firebaseConfig = {
      apiKey: "AIzaSyA-aYLP7eTUr3vyGqIuFJ1GVE42JjcM1UU",
      authDomain: "fbchesst.firebaseapp.com",
      databaseURL: "https://fbchesst-default-rtdb.firebaseio.com",
      projectId: "fbchesst",
      storageBucket: "fbchesst.firebasestorage.app",
      messagingSenderId: "774699466227",
      appId: "1:774699466227:web:e140d20877c19ec1e9e686",
      measurementId: "G-1LDBXBT2QD"
    }
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- 2. STATE VARIABLES ---
    const myId = Math.random().toString(36).substr(2, 9);
    let isRemoteAction = false; // Crucial: Prevents infinite Firebase loops
    let myRole = null; // 'host' or 'guest'
    let isPlayerReady = false;

    // --- 3. DOM ELEMENTS ---
    const setupScreen = document.getElementById('setup-screen');
    const videoContainer = document.getElementById('video-container');
    const video = document.getElementById('video-player');
    const fileInput = document.getElementById('file-input');
    const loadBtn = document.getElementById('load-btn');
    const readyBtn = document.getElementById('ready-btn');
    const statusText = document.getElementById('status-text');
    const reactionsContainer = document.getElementById('reactions-container');

    // --- 4. SETUP & ROLE ASSIGNMENT ---

    // Assign roles. First person to connect is Host, second is Guest.
    // When they disconnect, Firebase clears their role.
    db.ref('.info/connected').on('value', snap => {
      if (snap.val() === true) {
        // Check if host slot is empty
        db.ref('host').once('value', hostSnap => {
          if (!hostSnap.exists()) {
            myRole = 'host';
            db.ref('host').onDisconnect().remove();
            db.ref('host').set({
              id: myId,
              ready: false
            });
          } else {
            myRole = 'guest';
            db.ref('guest').onDisconnect().remove();
            db.ref('guest').set({
              id: myId,
              ready: false
            });
          }
        });
      }
    });

    loadBtn.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        video.src = URL.createObjectURL(file);
        readyBtn.style.display = 'flex';
        loadBtn.innerHTML = '<i class="fas fa-check-circle"></i> Video Loaded';
        loadBtn.style.borderColor = '#4caf50';
        loadBtn.style.color = '#4caf50';
        statusText.innerText = "Tap Ready when you're set.";
      }
    });

    readyBtn.addEventListener('click', () => {
      // iOS WORKAROUND: You MUST call play() directly inside a click handler 
      // to "unlock" the video element for future programmatic plays.
      video.play().then(() => {
        video.pause(); // Immediately pause, we just needed to unlock it
        isPlayerReady = true;
        readyBtn.classList.add('active');
        readyBtn.innerHTML = '<i class="fas fa-check"></i> Ready!';
        statusText.innerText = "Waiting for the other person...";

        db.ref(myRole + '/ready').set(true);
      }).catch(e => {
        statusText.innerText = "Error unlocking video. Try tapping Ready again.";
      });
    });

    // Listen for BOTH users to be ready before showing the video
    db.ref('host/ready').on('value', snap => {
      checkBothReady(snap.val(), 'host');
    });
    db.ref('guest/ready').on('value', snap => {
      checkBothReady(snap.val(), 'guest');
    });

    let hostReady = false,
      guestReady = false;

    function checkBothReady(val, role) {
      if (role === 'host') hostReady = val;
      if (role === 'guest') guestReady = val;

      if (hostReady && guestReady) {
        startWatchParty();
      }
    }

    // --- 5. START WATCH PARTY ---
    function startWatchParty() {
      if (videoContainer.style.display === 'block') return; // Already started

      setupScreen.style.display = 'none';
      videoContainer.style.display = 'block';

      // Clear any old sync data from a previous session, start fresh
      db.ref('sync').set({
        isPlaying: false,
        currentTime: 0,
        lastActionBy: myId
      });

      // Start listening for sync changes NOW
      listenForSync();

      // Start drift correction interval
      setInterval(sendDriftCorrection, 5000);
    }

    // --- 6. SYNC LOGIC (The Tricky Part) ---

    // A. Listen to Firebase
    function listenForSync() {
      db.ref('sync').on('value', snap => {
        const data = snap.val();
        if (!data || data.lastActionBy === myId) return; // Ignore own echoes

        // Only apply sync if the player has been unlocked (Ready button tapped)
        if (!isPlayerReady) return;

        // Handle Play/Pause
        if (data.isPlaying !== undefined && video.paused !== data.isPlaying) {
          isRemoteAction = true; // Set flag so our local listener ignores this
          if (data.isPlaying) {
            video.play().catch(e => console.log("Autoplay blocked"));
          } else {
            video.pause();
          }
        }

        // Handle Seeking (Only force seek if drift is > 1.5 seconds to avoid jitter)
        if (data.currentTime !== undefined && Math.abs(video.currentTime - data.currentTime) > 1.5) {
          isRemoteAction = true;
          video.currentTime = data.currentTime;
        }
      });
    }

    // B. Local Player Event Listeners
    video.addEventListener('play', () => {
      if (isRemoteAction) {
        isRemoteAction = false;
        return;
      }
      db.ref('sync').update({
        isPlaying: true,
        currentTime: video.currentTime,
        lastActionBy: myId
      });
    });

    video.addEventListener('pause', () => {
      if (isRemoteAction) {
        isRemoteAction = false;
        return;
      }
      db.ref('sync').update({
        isPlaying: false,
        currentTime: video.currentTime,
        lastActionBy: myId
      });
    });

    video.addEventListener('seeked', () => {
      if (isRemoteAction) {
        isRemoteAction = false;
        return;
      }
      db.ref('sync').update({
        currentTime: video.currentTime,
        lastActionBy: myId
      });
    });

    // C. Drift Correction (Background sync every 5 seconds)
    function sendDriftCorrection() {
      if (isPlayerReady && !video.paused) {
        db.ref('sync').update({
          currentTime: video.currentTime,
          lastActionBy: myId
        });
      }
    }

    // --- 7. REACTIONS ---
    document.querySelectorAll('.reaction-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation(); // Don't trigger video pause
        const emoji = btn.getAttribute('data-emoji');
        db.ref('reactions').push(emoji);
        spawnEmoji(emoji); // Show locally instantly
      });
    });

    db.ref('reactions').on('child_added', snap => {
      const emoji = snap.val();
      if (emoji) {
        spawnEmoji(emoji);
        snap.ref.remove(); // Clean up Firebase after displaying
      }
    });

    function spawnEmoji(emoji) {
      const el = document.createElement('div');
      el.classList.add('floating-emoji');
      el.innerText = emoji;
      el.style.left = Math.random() * 70 + 15 + '%'; // Random horizontal position
      reactionsContainer.appendChild(el);
      setTimeout(() => el.remove(), 2500);
    }

  </script>
</body>

</html>
